<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link rel="stylesheet" href="style4.css">
</head>
<body>
    <div class="clock-container">
        <h1 id="clock">00:00:00</h1>
        <h2 id="greeting"></h2>
        <h3 id="date"></h3>
        <p id="progress"></p>
        <p id="zone"></p>
        <p id="week"></p>
        <p id="quote"></p>


        <div class="progress-section">

<p>Day Progress</p>
<div class="bar">
    <div id="dayBar" class="fill"></div>
</div>

<p>Month Progress</p>
<div class="bar">
    <div id="monthBar" class="fill"></div>
</div>

<p>Year Progress</p>
<div class="bar">
    <div id="yearBar" class="fill"></div>
</div>

</div>

    </div>
    
    <script src="script4.js"></script>
</body>
</html>
